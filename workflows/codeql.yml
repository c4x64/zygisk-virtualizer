name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: cpp
            build-mode: autobuild

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality
          config: |
            paths:
              - zygisk_entry.cpp
              - seccomp_engine.cpp
              - virtualizer_core.cpp
              - virtualizer.h
            paths-ignore:
              - '**/*.md'
              - '**/*.sh'
              - '**/*.prop'
              - 'jni/'
              - 'obj/'

      - name: Setup build environment
        if: matrix.build-mode == 'autobuild'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip curl
          
          NDK_URL="https://dl.google.com/android/repository/android-ndk-r25c-linux.zip"
          NDK_DIR="/opt/android-ndk-r25c"
          
          if [ ! -d "$NDK_DIR" ]; then
            echo "Downloading Android NDK..."
            curl -fsSL -o /tmp/ndk.zip "$NDK_URL"
            unzip -q /tmp/ndk.zip -d /opt/
            rm -f /tmp/ndk.zip
          fi
          
          mkdir -p jni
          ln -sf "$PWD/zygisk_entry.cpp" jni/zygisk_entry.cpp
          ln -sf "$PWD/seccomp_engine.cpp" jni/seccomp_engine.cpp
          ln -sf "$PWD/virtualizer_core.cpp" jni/virtualizer_core.cpp
          ln -sf "$PWD/virtualizer.h" jni/virtualizer.h
          ln -sf "$PWD/zygisk.hpp" jni/zygisk.hpp
          ln -sf "$PWD/Android.mk" jni/Android.mk
          ln -sf "$PWD/Application.mk" jni/Application.mk

      - name: Build for CodeQL analysis
        if: matrix.build-mode == 'autobuild'
        env:
          NDK_PROJECT_PATH: ${{ github.workspace }}
        run: |
          NDK_DIR="/opt/android-ndk-r25c"
          export PATH="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          $NDK_DIR/ndk-build NDK_DEBUG=0 2>&1

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
