name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: read

env:
  NDK_URL: https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
  NDK_DIR: /opt/android-ndk-r25c

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_DIR }}
          key: ndk-r25c-${{ runner.arch }}

      - name: Setup Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Android NDK r25c..."
          curl -fsSL -o /tmp/ndk.zip ${{ env.NDK_URL }}
          unzip -q /tmp/ndk.zip -d /opt/
          rm -f /tmp/ndk.zip

      - name: Setup JNI symlinks
        run: |
          mkdir -p jni
          ln -sf "$PWD/zygisk_entry.cpp" jni/zygisk_entry.cpp
          ln -sf "$PWD/seccomp_engine.cpp" jni/seccomp_engine.cpp
          ln -sf "$PWD/virtualizer_core.cpp" jni/virtualizer_core.cpp
          ln -sf "$PWD/virtualizer.h" jni/virtualizer.h
          ln -sf "$PWD/zygisk.hpp" jni/zygisk.hpp
          ln -sf "$PWD/Android.mk" jni/Android.mk
          ln -sf "$PWD/Application.mk" jni/Application.mk

      - name: Build release library
        env:
          NDK_PROJECT_PATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          ${{ env.NDK_DIR }}/ndk-build NDK_DEBUG=0
          if [ ! -f libs/arm64-v8a/libvirtualizer.so ]; then
            echo "Build failed: libvirtualizer.so not found"
            exit 1
          fi
          echo "Build successful"
          ls -lh libs/arm64-v8a/libvirtualizer.so

      - name: Strip debug symbols
        run: |
          STRIP=${{ env.NDK_DIR }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          if [ -f libs/arm64-v8a/libvirtualizer.so ]; then
            cp libs/arm64-v8a/libvirtualizer.so libs/arm64-v8a/libvirtualizer_unstripped.so
            $STRIP libs/arm64-v8a/libvirtualizer.so
            echo "Symbols stripped"
            ls -lh libs/arm64-v8a/libvirtualizer.so
          fi

      - name: Package Magisk module
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          MODULE_DIR="/tmp/zygisk-virtualizer"

          rm -rf "$MODULE_DIR"
          mkdir -p "$MODULE_DIR/zygisk"

          # Update versionCode in module.prop
          VERSION_CODE=$(date +%Y%m%d)
          sed -i "s/versionCode=.*/versionCode=$VERSION_CODE/" module.prop

          cp libs/arm64-v8a/libvirtualizer.so "$MODULE_DIR/zygisk/arm64-v8a.so"
          cp module.prop "$MODULE_DIR/"
          cp post-fs-data.sh "$MODULE_DIR/"
          cp service.sh "$MODULE_DIR/"

          # Generate checksums
          cd "$MODULE_DIR"
          md5sum zygisk/arm64-v8a.so > zygisk/arm64-v8a.so.md5
          sha256sum zygisk/arm64-v8a.so > zygisk/arm64-v8a.so.sha256

          # Create zip
          ZIP_NAME="zygisk-virtualizer-v${VERSION}.zip"
          zip -r "${ZIP_NAME}" .
          mv "${ZIP_NAME}" "${GITHUB_WORKSPACE}/${ZIP_NAME}"

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "Module packaged: ${ZIP_NAME}"
          ls -lh "${GITHUB_WORKSPACE}/${ZIP_NAME}"

      - name: Create release notes
        id: release_notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > /tmp/release_notes.md << EOF
          ## Zygisk Virtualizer v${VERSION}

           ### Module Installation
           Download zygisk-virtualizer-v${VERSION}.zip and install via Magisk Manager:
           1. Open Magisk Manager -> Modules
           2. Tap "Install from storage"
           3. Select the downloaded .zip
           4. Reboot

           ### Manual ADB Installation
           \`\`\`sh
           adb push zygisk-virtualizer-v${VERSION}.zip /data/local/tmp/
           adb shell su -c 'magisk --install-module /data/local/tmp/zygisk-virtualizer-v${VERSION}.zip'
           adb reboot
           \`\`\`

           ### Zip Contents
           - zygisk/arm64-v8a.so - Compiled Zygisk module (ARM64)
           - module.prop - Magisk module metadata
           - post-fs-data.sh - Boot-time cleanup script
           - service.sh - Service watchdog script

           ### Checksums
           See *.md5 and *.sha256 files in the release assets.

           ### Requirements
           - Android 11+ (API 30)
           - Linux kernel 5.0+ with SECCOMP_RET_USER_NOTIF support
           - Magisk 27+ with Zygisk enabled
           - ARM64 architecture
          EOF
          echo "Release notes written to /tmp/release_notes.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zygisk Virtualizer ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          files: |
            ${{ env.ZIP_NAME }}
            README.md
            LICENSE
          fail_on_unmatched_files: false
          generate_release_notes: false
          draft: false
          prerelease: false

      - name: Auto-increment version for next release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "Current version: $VERSION"
          echo "Next version: $NEXT_VERSION"
          git config user.name "c4x64"
          git config user.email "dev@zygisk-virtualizer.local"
          git tag "$NEXT_VERSION" ${{ github.sha }}
          git push origin "$NEXT_VERSION"
